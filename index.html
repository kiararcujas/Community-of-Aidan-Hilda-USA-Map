<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Community Map</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: #F8F6EE;
}

/* WRAPPER THAT FIXES SPRINGLY CLIPPING */
#map-wrapper {
    width: 100%;
    height: 600px; /* fits inside Springly iframe */
    overflow-y: auto; /* <-- THE FIX */
    overflow-x: hidden;
}

/* The map itself can be tall now */
#map {
    width: 100%;
    height: 900px; /* full map height, scrollable inside wrapper */
}
</style>
</head>

<body>

<div id="map-wrapper">
    <div id="map"></div>
</div>

<script>

// ==========================
// REGION COLORS (BLUE FAMILY + AK/HI UNIQUE)
// ==========================
const regionColors = {
    1: "#A7C7E7", // Pacific
    2: "#7FA7B5", // Mountain
    3: "#4A6FA5", // Central
    4: "#5FA8A7", // Eastern
    5: "#8FB8A8", // Alaska (sage blue)
    6: "#E8A6A1"  // Hawaii (coral rose)
};

// ==========================
// REGION NAMES
// ==========================
const regionNames = {
    1: "Pacific",
    2: "Mountain",
    3: "Central",
    4: "Eastern",
    5: "",
    6: ""
};

// ==========================
// REGION ASSIGNMENTS
// ==========================
const stateRegion = {
    // Pacific
    WA:1, OR:1, NV:1, CA:1,

    // Mountain
    ID:2, MT:2, WY:2, UT:2, AZ:2, NM:2, CO:2,

    // Central
    ND:3, SD:3, NE:3, KS:3, OK:3, TX:3,
    MN:3, IA:3, MO:3, AR:3, LA:3,

    // Eastern
    ME:4, NH:4, VT:4, MA:4, RI:4, CT:4, NY:4, NJ:4, PA:4,
    DE:4, MD:4, VA:4, WV:4, NC:4, SC:4, GA:4, FL:4,
    OH:4, MI:4, IN:4, IL:4, WI:4, KY:4, TN:4, AL:4, MS:4,

    // Alaska + Hawaii
    AK:5,
    HI:6
};

// ==========================
// COMMUNITY DATA
// ==========================
const labels = {
    lv: "Long Voyager",
    v: "Voyager",
    f: "Friend",
    s: "Sojourner",
    e: "Explorer"
};

const dataMap = {
    PA: { e:2 }, KY: { e:1 }, IN: { e:3, f:1 }, KS: { e:1, f:1 }, VT: { f:1 },
    CO: { lv:3, v:3 }, NJ: { lv:1, v:1 }, WV: { v:3, s:1 }, MS: { f:1 },
    MN: { lv:1, v:2, s:1 }, NY: { lv:1, v:2, f:3 }, NM: { lv:1, s:2, f:4 },
    FL: { s:1, e:2 }, TN: { v:2, f:1 }, CA: { v:1, s:1, e:1, f:3 },
    TX: { v:6, s:1, e:1, f:1 }, OK: { s:1, f:2 }, OR: { v:1, f:2 },
    WA: { v:7, s:1 }, VA: { v:2, f:1 }, IA: { s:1, v:1 }, AZ: { f:1 },
    NC: { v:1, e:1, f:2 }, AL: { v:1, f:1 }, SC: { v:1, s:1, e:1 },
    MI: { f:2 }, GA: { v:1, s:1, e:3, f:3 }, IL: { s:1, e:1, f:3 },
    OH: { s:2, f:1 }, NE: { s:1 }, MO: { s:1, f:1 }
};

// ==========================
// STATE CENTROIDS
// ==========================
const stateCenters = {
    AL:[32.806671,-86.791130], AK:[61.370716,-152.404419], AZ:[33.729759,-111.431221],
    AR:[34.969704,-92.373123], CA:[36.116203,-119.681564], CO:[39.059811,-105.311104],
    CT:[41.597782,-72.755371], DE:[39.318523,-75.507141], FL:[27.766279,-81.686783],
    GA:[33.040619,-83.643074], HI:[21.094318,-157.498337], ID:[44.240459,-114.478828],
    IL:[40.349457,-88.986137], IN:[39.849426,-86.258278], IA:[42.011539,-93.210526],
    KS:[38.526600,-96.726486], KY:[37.668140,-84.670067], LA:[31.169546,-91.867805],
    ME:[44.693947,-69.381927], MD:[39.063946,-76.802101], MA:[42.230171,-71.530106],
    MI:[43.326618,-84.536095], MN:[45.694454,-93.900192], MS:[32.741646,-89.678696],
    MO:[38.456085,-92.288368], MT:[46.921925,-110.454353], NE:[41.125370,-98.268082],
    NV:[38.313515,-117.055374], NH:[43.452492,-71.563896], NJ:[40.298904,-74.521011],
    NM:[34.840515,-106.248482], NY:[42.165726,-74.948051], NC:[35.630066,-79.806419],
    ND:[47.528912,-99.784012], OH:[40.388783,-82.764915], OK:[35.565342,-96.928917],
    OR:[44.572021,-122.070938], PA:[40.590752,-77.209755], RI:[41.680893,-71.511780],
    SC:[33.856892,-80.945007], SD:[44.299782,-99.438828], TN:[35.747845,-86.692345],
    TX:[31.054487,-97.563461], UT:[40.150032,-111.862434], VT:[44.045876,-72.710686],
    VA:[37.769337,-78.169968], WA:[47.400902,-121.490494], WV:[38.491226,-80.954453],
    WI:[44.268543,-89.616508], WY:[42.755966,-107.302490]
};

// ==========================
// BUILD ARRAYS
// ==========================
const allStates = Object.keys(stateCenters);

// Region numeric values
const regionZ = allStates.map(s => stateRegion[s]);

// ==========================
// HOVER TEXT (AK + HI SPECIAL CASE)
// ==========================
const hoverText = allStates.map(state => {
    const region = regionNames[stateRegion[state]];
    const info = dataMap[state];

    if (state === "AK" || state === "HI") {
        return `<b>${state}</b><br><br>No members yet — a warm welcome awaits future community members.`;
    }

    let base = `<b>${state}</b><br><b>Region:</b> ${region}<br><br>`;

    if (!info) {
        return base + `No members yet — a warm welcome awaits future community members.`;
    }

    return base +
        Object.entries(info)
        .map(([k,v]) => `${labels[k]}: ${v}`)
        .join("<br>");
});

// ==========================
// DISCRETE COLOR SCALE
// ==========================
const colorscale = [
    [0.00, regionColors[1]],
    [0.20, regionColors[1]],
    [0.20, regionColors[2]],
    [0.40, regionColors[2]],
    [0.40, regionColors[3]],
    [0.60, regionColors[3]],
    [0.60, regionColors[4]],
    [0.80, regionColors[4]],
    [0.80, regionColors[5]],
    [0.90, regionColors[5]],
    [0.90, regionColors[6]],
    [1.00, regionColors[6]]
];

// ==========================
// CHOROPLETH
// ==========================
const trace = {
    type: "choropleth",
    locationmode: "USA-states",
    locations: allStates,
    z: regionZ,
    text: hoverText,
    hovertemplate: "%{text}<extra></extra>",
    colorscale: colorscale,
    showscale: false,
    marker: {
        line: { color: "#FFFFFF", width: 1 }
    }
};

// ==========================
// LABELS
// ==========================
const labelTrace = {
    type: "scattergeo",
    locationmode: "USA-states",
    lat: allStates.map(s => stateCenters[s][0]),
    lon: allStates.map(s => stateCenters[s][1]),
    text: allStates.map(s => `<b>${s}</b>`),
    mode: "text",
    textfont: {
        size: 14,
        color: "#1A1A1A",
        family: "Arial"
    },
    hoverinfo: "skip"
};

// ==========================
// LAYOUT (SPRINGLY FIX + SCALE FIX)
// ==========================
const layout = {
    geo: {
        scope: "usa",
        projection: { 
            type: "albers usa",
            scale: 0.85  // ⭐ THE FIX
        },
        showland: true,
        landcolor: "#F8F6EE",
        fitbounds: "locations"
    },
    margin: {t:0,b:0,l:0,r:0}
};

Plotly.newPlot("map", [trace, labelTrace], layout, {responsive:true});

// ==========================
// CLICK INTERACTION (AK + HI SPECIAL CASE)
// ==========================
document.getElementById('map').on('plotly_click', function(data) {
    const state = data.points[0].location;
    const region = regionNames[stateRegion[state]];
    const info = dataMap[state];

    if (state === "AK" || state === "HI") {
        alert(`${state}\n\nNo members yet — a warm welcome awaits future community members.`);
        return;
    }

    let message = `${state} — Region: ${region}\n\n`;

    if (!info) {
        message += `No members yet — a warm welcome awaits future community members.`;
    } else {
        message += Object.entries(info)
            .map(([k,v]) => `${labels[k]}: ${v}`)
            .join("\n");
    }

    alert(message);
});

</script>

</body>
</html>
