<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Community Map</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #F8F6EE;
}

#map {
    width: 100%;
    height: 650px;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

// ==========================
// FULL CLASSIFICATION LABELS
// ==========================
const labels = {
    lv: "Long Voyager",
    v: "Voyager",
    f: "Friend",
    s: "Sojourner",
    e: "Explorer"
};

// ==========================
// COMMUNITY DATA
// ==========================
const dataMap = {
    PA: { e:2 },
    KY: { e:1 },
    IN: { e:3, f:1 },
    KS: { e:1, f:1 },
    VT: { f:1 },
    CO: { lv:3, v:3 },
    NJ: { lv:1, v:1 },
    WV: { v:3, s:1 },
    MS: { f:1 },
    MN: { lv:1, v:2, s:1 },
    NY: { lv:1, v:2, f:3 },
    NM: { lv:1, s:2, f:4 },
    FL: { s:1, e:2 },
    TN: { v:2, f:1 },
    CA: { v:1, s:1, e:1, f:3 },
    TX: { v:6, s:1, e:1, f:1 },
    OK: { s:1, f:2 },
    OR: { v:1, f:2 },
    WA: { v:7, s:1 },
    VA: { v:2, f:1 },
    IA: { s:1, v:1 },
    AZ: { f:1 },
    NC: { v:1, e:1, f:2 },
    AL: { v:1, f:1 },
    SC: { v:1, s:1, e:1 },
    MI: { f:2 },
    GA: { v:1, s:1, e:3, f:3 },
    IL: { s:1, e:1, f:3 },
    OH: { s:2, f:1 },
    NE: { s:1 },
    MO: { s:1, f:1 }
};

// ==========================
// STATE CENTROIDS
// ==========================
const stateCenters = {
    AL:[32.806671,-86.791130], AK:[61.370716,-152.404419], AZ:[33.729759,-111.431221],
    AR:[34.969704,-92.373123], CA:[36.116203,-119.681564], CO:[39.059811,-105.311104],
    CT:[41.597782,-72.755371], DE:[39.318523,-75.507141], FL:[27.766279,-81.686783],
    GA:[33.040619,-83.643074], HI:[21.094318,-157.498337], ID:[44.240459,-114.478828],
    IL:[40.349457,-88.986137], IN:[39.849426,-86.258278], IA:[42.011539,-93.210526],
    KS:[38.526600,-96.726486], KY:[37.668140,-84.670067], LA:[31.169546,-91.867805],
    ME:[44.693947,-69.381927], MD:[39.063946,-76.802101], MA:[42.230171,-71.530106],
    MI:[43.326618,-84.536095], MN:[45.694454,-93.900192], MS:[32.741646,-89.678696],
    MO:[38.456085,-92.288368], MT:[46.921925,-110.454353], NE:[41.125370,-98.268082],
    NV:[38.313515,-117.055374], NH:[43.452492,-71.563896], NJ:[40.298904,-74.521011],
    NM:[34.840515,-106.248482], NY:[42.165726,-74.948051], NC:[35.630066,-79.806419],
    ND:[47.528912,-99.784012], OH:[40.388783,-82.764915], OK:[35.565342,-96.928917],
    OR:[44.572021,-122.070938], PA:[40.590752,-77.209755], RI:[41.680893,-71.511780],
    SC:[33.856892,-80.945007], SD:[44.299782,-99.438828], TN:[35.747845,-86.692345],
    TX:[31.054487,-97.563461], UT:[40.150032,-111.862434], VT:[44.045876,-72.710686],
    VA:[37.769337,-78.169968], WA:[47.400902,-121.490494], WV:[38.491226,-80.954453],
    WI:[44.268543,-89.616508], WY:[42.755966,-107.302490]
};

// ==========================
// REGION DEFINITIONS
// ==========================
const stateRegion = {
    ME:"NE", NH:"NE", VT:"NE", MA:"NE", RI:"NE", CT:"NE", NY:"NE", NJ:"NE", PA:"NE",
    DE:"SO", MD:"SO", VA:"SO", WV:"SO", KY:"SO", TN:"SO", NC:"SO", SC:"SO", GA:"SO", FL:"SO",
    AL:"SO", MS:"SO", AR:"SO", LA:"SO", TX:"SO", OK:"SO",
    OH:"MW", MI:"MW", IN:"MW", IL:"MW", WI:"MW", MN:"MW", IA:"MW", MO:"MW",
    ND:"MW", SD:"MW", NE:"MW", KS:"MW",
    MT:"WE", WY:"WE", CO:"WE", NM:"WE", AZ:"WE", UT:"WE", NV:"WE", ID:"WE",
    WA:"WE", OR:"WE", CA:"WE", AK:"WE", HI:"WE"
};

const regionColors = {
    NE: "#A7C7E7", // Ice Blue
    SO: "#7FA7B5", // Steel Blue
    MW: "#4A6FA5", // Deep Blue
    WE: "#5FA8A7"  // Teal Blue
};

// ==========================
// BUILD MAP ARRAYS
// ==========================
const allStates = Object.keys(stateCenters);

// Member totals (with 0.0001 fix)
const totals = allStates.map(s =>
    dataMap[s] ? Object.values(dataMap[s]).reduce((a,b)=>a+b,0) : 0.0001
);

// Region color array
const regionFill = allStates.map(s => regionColors[stateRegion[s]]);

// ==========================
// HOVER TEXT
// ==========================
const hoverText = allStates.map(state => {
    if (!dataMap[state]) {
        return `<b>${state}</b><br><br>No members yet — a warm welcome awaits future community members.`;
    }

    let breakdown = Object.entries(dataMap[state])
        .map(([k,v]) => `${labels[k]}: ${v}`)
        .join("<br>");

    return `<b>${state}</b><br><br>${breakdown}`;
});

// ==========================
// REGION BACKGROUND LAYER
// ==========================
const regionTrace = {
    type: "choropleth",
    locationmode: "USA-states",
    locations: allStates,
    z: allStates.map(s => 1), // dummy
    text: hoverText,
    hoverinfo: "skip",
    colorscale: regionFill.map((c,i)=>[i/(regionFill.length-1), c]),
    showscale: false,
    marker: {line: {color:"#FFFFFF", width:1}}
};

// ==========================
// MEMBER DENSITY LAYER
// ==========================
const densityTrace = {
    type: "choropleth",
    locationmode: "USA-states",
    locations: allStates,
    z: totals,
    text: hoverText,
    hovertemplate: "%{text}<extra></extra>",
    colorscale: [
        [0, "#D8E7F5"],
        [1, "#2F4858"]
    ],
    showscale: false,
    opacity: 0.55
};

// ==========================
// LABELS TRACE
// ==========================
const labelTrace = {
    type: "scattergeo",
    locationmode: "USA-states",
    lat: allStates.map(s => stateCenters[s][0]),
    lon: allStates.map(s => stateCenters[s][1]),
    text: allStates.map(s => `<b>${s}</b>`),
    mode: "text",
    textfont: {
        size: 14,
        color: "#1A1A1A",
        family: "Arial"
    },
    hoverinfo: "skip"
};

// ==========================
// LAYOUT
// ==========================
const layout = {
    geo: {
        scope: "usa",
        showland: true,
        landcolor: "#F8F6EE"
    },
    margin: {t:0,b:0,l:0,r:0}
};

Plotly.newPlot("map", [regionTrace, densityTrace, labelTrace], layout, {responsive:true});

// ==========================
// CLICK INTERACTION
// ==========================
document.getElementById('map').on('plotly_click', function(data) {
    const state = data.points[0].location;
    const info = dataMap[state];

    let message;

    if (!info) {
        message = `${state}: No members yet — a warm welcome awaits future community members.`;
    } else {
        message = `${state}\n\n` +
            Object.entries(info)
            .map(([k,v]) => `${labels[k]}: ${v}`)
            .join("\n");
    }

    alert(message);
});

</script>

</body>
</html>
